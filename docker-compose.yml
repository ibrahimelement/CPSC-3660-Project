services:

  # ── PHP 8.2 + Apache ──────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST:  ${DB_HOST}
      DB_NAME:  ${DB_NAME}
      DB_USER:  ${DB_USER}
      DB_PASS:  ${DB_PASS}
      BASE_URL: ${BASE_URL}
    volumes:
      # Live-mount the source so edits take effect without rebuilding
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── MySQL 8 ───────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      # Persist data between restarts
      - db_data:/var/lib/mysql
      # Auto-import schema + seed on first startup
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root",
             "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── phpMyAdmin ────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    ports:
      - "8081:80"
    environment:
      PMA_HOST:     db
      PMA_USER:     root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
